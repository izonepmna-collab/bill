<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I Zone – Products</title>
  <meta name="description" content="Manage products and pricing for I Zone billing system">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="products-layout">

  <!-- Sidebar Nav -->
  <aside class="products-sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">🖨</span>
        <span>I Zone</span>
      </div>
        <div class="nav-links">
          <a href="index.html"   class="nav-link">🧾 Billing</a>
          <a href="bills.html"   class="nav-link">📂 Bills</a>
          <a href="products.html" class="nav-link active">📦 Products</a>
          <a href="settings.html" class="nav-link">⚙️ Settings</a>
          <a href="users.html"    class="nav-link">👥 Users</a>
          <a href="reports.html"  class="nav-link">📊 Reports</a>
        </div>
      </div>
      
      <div onclick="logout()" style="padding: 12px 20px; color: #ef4444; font-weight: 600; cursor: pointer; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px;">
        🚪 Logout
      </div>
  </aside>

  <!-- Main Content -->
  <main class="products-main">
    <div class="page-title">📦 Products & Pricing</div>
    <div class="page-sub">Add, edit or delete products. Each product can have multiple size/type options with individual prices.</div>

    <!-- ── Add / Edit Form ── -->
    <div class="form-panel" id="add-form-panel">
      <h3 id="form-title">➕ Add New Product</h3>

      <div class="form-row">
        <div class="form-group-dark">
          <label>Product Name</label>
          <input type="text" id="p-name" placeholder="e.g. Lamination">
        </div>
        <div class="form-group-dark">
          <label>Category</label>
          <input type="text" id="p-category" placeholder="e.g. Lamination" list="cat-list">
          <datalist id="cat-list"></datalist>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group-dark">
          <label>Pricing Type</label>
          <select id="p-type" onchange="onTypeChange()">
            <option value="variants">Multiple Options (Variants)</option>
            <option value="fixed">Single Fixed Price</option>
            <option value="slab">Slab / Quantity Pricing</option>
          </select>
        </div>
        <div class="form-group-dark" id="fixed-rate-wrap" style="display:none;">
          <label>Rate (₹)</label>
          <input type="number" id="p-rate" placeholder="e.g. 40" min="0" step="0.5">
        </div>
      </div>

      <!-- Variants Section -->
      <div id="variants-section">
        <label style="margin-bottom:10px; display:block;">Options / Variants</label>
        <div id="variants-list"></div>
        <div class="add-variant-row" onclick="addVariantRow()">
          + Add Option
        </div>
      </div>

      <!-- Slab Section -->
      <div id="slab-section" style="display:none;">
        <label style="margin-bottom:10px; display:block;">Slab Ranges</label>
        <div id="slab-list"></div>
        <div class="add-variant-row" onclick="addSlabRow()">
          + Add Slab Range
        </div>
      </div>

      <div style="display:flex; gap:10px; margin-top:20px;">
        <button class="btn" onclick="saveProduct()">💾 Save Product</button>
        <button class="btn btn-outline" onclick="cancelEdit()">Cancel</button>
      </div>
    </div>

    <!-- ── Product List ── -->
    <div id="products-list">
      <div class="loading-msg" style="color:#94a3b8; padding:20px 0;">Loading products…</div>
    </div>
  </main>
</div>

<script src="products.js"></script>
</body>
</html>
