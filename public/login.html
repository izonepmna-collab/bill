<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I Zone – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a; --surface: #1e293b; --primary: #8b5cf6;
      --text: #f8fafc; --text-muted: #94a3b8; --border: #334155;
      --input-bg: #0f172a;
    }
    body {
      margin: 0; font-family: 'Inter', sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 100%; max-width: 380px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    .logo { text-align: center; margin-bottom: 30px; }
    .logo-icon { font-size: 40px; display: block; margin-bottom: 10px; }
    .logo-text { font-size: 24px; font-weight: 800; letter-spacing: 1px; }
    
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
    .form-group input {
      width: 100%; box-sizing: border-box; padding: 12px 16px;
      background: var(--input-bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 15px;
      outline: none; transition: 0.2s;
    }
    .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(139,92,246,0.2); }
    
    .btn {
      width: 100%; padding: 14px; background: var(--primary);
      color: white; border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: 0.2s; box-shadow: 0 4px 12px rgba(139,92,246,0.3);
    }
    .btn:hover { background: #7c3aed; transform: translateY(-1px); }
    
    .error-msg {
      color: #ef4444; font-size: 13px; font-weight: 500;
      text-align: center; margin-bottom: 16px; display: none;
      background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 8px;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <div class="logo">
      <span class="logo-icon">🖨</span>
      <div class="logo-text">I ZONE</div>
      <div style="font-size:13px; color:var(--text-muted); margin-top:4px;">Secure POS Login</div>
    </div>

    <div id="error-msg" class="error-msg"></div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="username">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
    </div>

    <button id="login-btn" class="btn" onclick="login()">Login</button>
  </div>

  <script>
    // If already logged in, redirect to billing
    if (localStorage.getItem('token')) {
      window.location.href = 'index.html';
    }

    document.getElementById('password').addEventListener('keypress', e => {
      if (e.key === 'Enter') login();
    });

    async function login() {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      const errEl = document.getElementById('error-msg');
      const btn = document.getElementById('login-btn');
      
      if (!u || !p) {
        errEl.textContent = 'Please enter both username and password.';
        errEl.style.display = 'block';
        return;
      }

      btn.textContent = 'Verifying...';
      btn.style.opacity = '0.7';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: u, password: p })
        });
        
        const data = await res.json();
        
        if (!res.ok) {
          throw new Error(data.error || 'Login failed');
        }

        // Save session
        localStorage.setItem('token', data.token);
        localStorage.setItem('role', data.role);
        localStorage.setItem('username', data.username);
        
        window.location.href = 'index.html';
        
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.textContent = 'Login';
        btn.style.opacity = '1';
      }
    }
  </script>
</body>
</html>
