<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I Zone – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a; --surface: #1e293b; --primary: #8b5cf6;
      --text: #f8fafc; --text-muted: #94a3b8; --border: #334155;
      --input-bg: #0f172a; --green: #10b981; --red: #ef4444;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(ellipse at top right, #1e1b4b, var(--bg) 70%);
      color: var(--text);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      background: rgba(30,41,59,0.85);
      backdrop-filter: blur(14px);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 40px;
      width: 100%; max-width: 390px;
      box-shadow: 0 24px 48px rgba(0,0,0,0.5);
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo-icon { font-size: 42px; display: block; margin-bottom: 10px; }
    .logo-text { font-size: 24px; font-weight: 800; letter-spacing: 1px; }
    .logo-sub { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 7px; }
    .form-group input {
      width: 100%; padding: 12px 16px;
      background: var(--input-bg); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 15px;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(139,92,246,0.2); }

    .btn {
      width: 100%; padding: 13px;
      background: var(--primary); color: white;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 4px 14px rgba(139,92,246,0.35);
    }
    .btn:hover { background: #7c3aed; transform: translateY(-1px); }
    .btn:active { transform: scale(0.98); }

    .msg-box {
      font-size: 13px; font-weight: 500;
      text-align: center; padding: 11px 14px;
      border-radius: 8px; margin-bottom: 18px; display: none;
    }
    .msg-error   { color: #fca5a5; background: rgba(239,68,68,0.12); border: 1px solid #ef4444; }
    .msg-success { color: #a7f3d0; background: rgba(16,185,129,0.12); border: 1px solid #10b981; }

    .link-btn {
      background: none; border: none; color: var(--primary);
      font-size: 13px; font-weight: 600; cursor: pointer;
      text-decoration: none; padding: 0; font-family: inherit;
      transition: color 0.2s;
    }
    .link-btn:hover { color: #c4b5fd; }

    .footer-row {
      display: flex; justify-content: flex-end;
      margin-top: 16px;
    }

    .temp-pwd-box {
      background: rgba(139,92,246,0.12);
      border: 1px dashed var(--primary);
      border-radius: 10px;
      padding: 16px;
      margin: 16px 0 4px;
      text-align: center;
    }
    .temp-pwd-label { font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .temp-pwd-val { font-size: 24px; font-weight: 800; color: #c4b5fd; letter-spacing: 3px; margin-top: 6px; }
    .temp-pwd-hint { font-size: 12px; color: var(--text-muted); margin-top: 8px; }
  </style>
</head>
<body>

  <div class="login-box">

    <!-- Alert box -->
    <div id="msg-box" class="msg-box"></div>

    <!-- LOGIN VIEW -->
    <div id="login-view">
      <div class="logo">
        <span class="logo-icon">🖨</span>
        <div class="logo-text">I ZONE</div>
        <div class="logo-sub">Secure POS Login</div>
      </div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
      </div>

      <button id="login-btn" class="btn" onclick="login()">Login</button>

      <div class="footer-row">
        <button class="link-btn" onclick="showForgot(true)">Forgot Password?</button>
      </div>
    </div>

    <!-- FORGOT PASSWORD VIEW -->
    <div id="forgot-view" style="display:none;">
      <div class="logo">
        <span class="logo-icon">🔑</span>
        <div class="logo-text">Reset Password</div>
        <div class="logo-sub">Enter your registered email address</div>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="reset-email" placeholder="e.g. muhsin@izone.com" autocomplete="email">
      </div>

      <button id="reset-btn" class="btn" onclick="forgotPassword()">Send Temporary Password</button>

      <!-- Shown for MD/admin users only -->
      <div id="temp-pwd-area" style="display:none;">
        <div class="temp-pwd-box">
          <div class="temp-pwd-label">Your Temporary Password</div>
          <div id="temp-pwd-val" class="temp-pwd-val">—</div>
          <div class="temp-pwd-hint">Use this to login, then change your password from Settings.</div>
        </div>
      </div>

      <div class="footer-row" style="margin-top:16px;">
        <button class="link-btn" onclick="showForgot(false)">← Back to Login</button>
      </div>
    </div>

  </div>

  <script>
    // If already logged in, redirect
    if (localStorage.getItem('token')) {
      window.location.href = 'index.html';
    }

    const msgBox = document.getElementById('msg-box');

    function showMsg(text, isSuccess = false) {
      msgBox.textContent = text;
      msgBox.className = 'msg-box ' + (isSuccess ? 'msg-success' : 'msg-error');
      msgBox.style.display = 'block';
    }
    function hideMsg() { msgBox.style.display = 'none'; }

    function showForgot(show) {
      hideMsg();
      document.getElementById('temp-pwd-area').style.display = 'none';
      document.getElementById('login-view').style.display  = show ? 'none' : 'block';
      document.getElementById('forgot-view').style.display = show ? 'block' : 'none';
      if (show) document.getElementById('reset-email').focus();
      else      document.getElementById('username').focus();
    }

    document.getElementById('password').addEventListener('keypress', e => {
      if (e.key === 'Enter') login();
    });
    document.addEventListener('keypress', e => {
      if (e.key === 'Enter' && document.getElementById('forgot-view').style.display !== 'none') forgotPassword();
    });

    async function login() {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');

      if (!u || !p) { showMsg('Please enter both username and password.'); return; }
      hideMsg();

      btn.textContent = 'Verifying…';
      btn.style.opacity = '0.7';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: u, password: p })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');

        localStorage.setItem('token',    data.token);
        localStorage.setItem('role',     data.role);
        localStorage.setItem('username', data.username);
        window.location.href = 'index.html';
      } catch (err) {
        showMsg(err.message);
        btn.textContent = 'Login';
        btn.style.opacity = '1';
      }
    }

    async function forgotPassword() {
      const email = document.getElementById('reset-email').value.trim();
      const btn = document.getElementById('reset-btn');
      if (!email) { showMsg('Please enter your email address.'); return; }
      hideMsg();
      document.getElementById('temp-pwd-area').style.display = 'none';

      btn.textContent = 'Sending…';
      btn.style.opacity = '0.7';

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Reset failed');

        showMsg(data.message, true);

        // If MD/admin, show temp password on screen
        if (data.tempPassword) {
          document.getElementById('temp-pwd-val').textContent = data.tempPassword;
          document.getElementById('temp-pwd-area').style.display = 'block';
        }
      } catch (err) {
        showMsg(err.message);
      } finally {
        btn.textContent = 'Send Temporary Password';
        btn.style.opacity = '1';
      }
    }
  </script>
</body>
</html>
